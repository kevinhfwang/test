name: Daily Content Generation

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install feedparser
      
      - name: Generate content
        run: python scripts/content_engine.py
      
      - name: Build site
        run: |
          mkdir -p _site/obsidian
          cp -r obsidian_vault/* _site/obsidian/
          cp output/spain-hot.xml _site/
      
      - name: Create obsidian index
        run: |
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Obsidian</title><style>body{font-family:system-ui;max-width:800px;margin:40px auto;padding:20px}h1{border-bottom:2px solid #667eea}.folder{background:#f5f5f5;padding:15px;margin:10px 0;border-radius:5px}a{color:#667eea}</style></head><body><h1>🇪🇸 Spain Identity System</h1><div class=folder><h3>📁 <a href="https://github.com/kevinhfwang/test/tree/main/obsidian_vault/02_Viral_Titles">爆款标题</a></h3></div><div class=folder><h3>📁 <a href="https://github.com/kevinhfwang/test/blob/main/obsidian_vault/04_Identity_Pathways/Identity_Pathways_Overview.md">身份路径</a></h3></div><div class=folder><h3>📁 <a href="https://github.com/kevinhfwang/test/tree/main/obsidian_vault/05_City_Database">城市数据库</a></h3></div><p><a href="https://github.com/kevinhfwang/test/tree/main/obsidian_vault">浏览完整知识库 →</a></p></body></html>' > _site/obsidian/index.html
      
      - name: Create main index
        run: |
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Spain Identity</title><style>body{font-family:system-ui;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0}.container{background:white;padding:40px;border-radius:20px;max-width:500px;text-align:center}.card{background:#f5f5f5;padding:20px;margin:15px 0;border-radius:10px}a{color:#667eea}</style></head><body><div class=container><h1>🇪🇸 Spain Identity System</h1><p>西班牙身份内容系统</p><div class=card><h3>📡 <a href="spain-hot.xml">RSS订阅</a></h3></div><div class=card><h3>📚 <a href="obsidian/">Obsidian知识库</a></h3></div></div></body></html>' > _site/index.html
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add obsidian_vault/
          git add output/
          git diff --cached --quiet || (git commit -m "Update daily content $(date +%Y-%m-%d)" && git push)
      
      - uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/deploy-pages@v4
