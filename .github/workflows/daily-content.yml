        h1 { color: #333; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .folder { background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 5px; border-left: 4px solid #667eea; }
        .folder h3 { margin: 0 0 10px 0; color: #667eea; }
