name: Daily Content Generation

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install feedparser
      
      - run: python scripts/content_engine.py
      
      - run: python scripts/weekly_analyzer.py
        if: github.event.schedule == '0 7 * * 0' || github.event_name == 'workflow_dispatch'
      
      - run: |
          mkdir -p _site/obsidian
          cp -r obsidian_vault/* _site/obsidian/ 2>/dev/null || true
          cp output/spain-hot.xml _site/
      
      - run: |
          cat > _site/obsidian/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Obsidian Vault</title>
    <style>
        body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .folder { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
        a { color: #667eea; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🇪🇸 Spain Identity System</h1>
    <p>Obsidian知识库 - 点击链接查看文件</p>
    
    <div class="folder">
        <h3>📁 02_Viral_Titles - 爆款标题</h3>
        <p><a href="https://github.com/kevinhfwang/test/tree/main/obsidian_vault/02_Viral_Titles">在GitHub上浏览 →</a></p>
    </div>
    
    <div class="folder">
        <h3>📁 04_Identity_Pathways - 身份路径</h3>
        <p><a href="https://github.com/kevinhfwang/test/blob/main/obsidian_vault/04_Identity_Pathways/Identity_Pathways_Overview.md">身份路径图谱</a></p>
    </div>
    
