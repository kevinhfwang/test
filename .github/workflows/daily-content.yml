HTMLEOF
      
      - run: |
          cat > _site/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spain Identity Content System</title>
    <style>
        body { font-family: system-ui; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 20px; max-width: 500px; text-align: center; }
        h1 { margin-bottom: 10px; }
        a { color: #667eea; text-decoration: none; }
        .card { background: #f5f5f5; padding: 20px; margin: 15px 0; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇪🇸 Spain Identity System</h1>
        <p>西班牙身份内容系统</p>
        <div class="card">
            <h3>📡 <a href="spain-hot.xml">RSS订阅</a></h3>
        </div>
        <div class="card">
            <h3>📚 <a href="obsidian/">Obsidian知识库</a></h3>
        </div>
    </div>
</body>
</html>
EOF
      
      - uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - uses: actions/deploy-pages@v4
