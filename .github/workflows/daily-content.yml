        <p>
            <a href="https://github.com/kevinhfwang/test/blob/main/obsidian_vault/05_City_Database/City_Database_Navarra.md">Navarra</a> | 
            <a href="https://github.com/kevinhfwang/test/blob/main/obsidian_vault/05_City_Database/City_Database_Madrid.md">Madrid</a>
        </p>
    </div>
    
    <div class="folder">
