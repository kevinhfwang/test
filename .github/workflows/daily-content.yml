name: Daily Content Generation

on:
  schedule:
    # 每天上午8点CET运行 (UTC+1 = 7:00 UTC)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      generate_report:
        description: 'Generate weekly report (only on Sundays)'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run content engine
        run: python scripts/content_engine.py

      - name: Check if Sunday (for weekly report)
        id: check_sunday
        run: |
          if [ "$(date +%u)" = "7" ] || [ "${{ github.event.inputs.generate_report }}" = "true" ]; then
            echo "is_sunday=true" >> $GITHUB_OUTPUT
          else
            echo "is_sunday=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate weekly report
        if: steps.check_sunday.outputs.is_sunday == 'true'
        run: python scripts/weekly_analyzer.py

      - name: Copy Obsidian vault to output
        run: |
          mkdir -p _site/obsidian
          cp -r obsidian_vault/* _site/obsidian/ 2>/dev/null || true
          cp output/spain-hot.xml _site/
          
          # 创建 Obsidian vault 的 HTML 入口页面
          cat > _site/obsidian/index.html << 'HTMLEOF'
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spain Identity Content System - Obsidian Vault</title>
    <style>
