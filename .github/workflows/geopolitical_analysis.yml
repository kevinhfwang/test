name: 🌍 地缘政治自动分析生成

on:
  # 定时运行 - 每周一、周四北京时间早上8点
  schedule:
    - cron: '0 0 * * 1,4'  # UTC 00:00 = 北京时间 08:00
  
  # 允许手动触发
  workflow_dispatch:
  
  # 代码推送时触发（用于测试）
  push:
    branches:
      - main
    paths:
      - 'scripts/geopolitical_analyzer.py'
      - '.github/workflows/geopolitical_analysis.yml'

env:
  PYTHON_VERSION: '3.10'

# 添加权限配置
permissions:
  contents: write
  actions: read

jobs:
  generate-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      # 1. 检出代码
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # 2. 设置 Python
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      # 3. 安装依赖
      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests
      
      # 4. 运行地缘政治分析器
      - name: 🌍 生成地缘政治分析
        run: |
          echo "正在生成地缘政治影响分析报告..."
          python scripts/geopolitical_analyzer.py
      
      # 5. 检查是否有新文件生成
      - name: 🔍 检查新生成的文件
        id: check_files
        run: |
          NEW_FILES=$(git status --porcelain content/geopolitical_impact_analysis_*.md 2>/dev/null || true)
          if [ -n "$NEW_FILES" ]; then
            echo "has_new_files=true" >> $GITHUB_OUTPUT
            echo "📄 发现新生成的文件:"
            echo "$NEW_FILES"
          else
            echo "has_new_files=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 没有新文件生成"
          fi
      
      # 6. 提交并推送新文件
      - name: 💾 提交新分析文件
        if: steps.check_files.outputs.has_new_files == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 添加新生成的文件
          git add content/geopolitical_impact_analysis_*.md
          
          # 提交
          git commit -m "🌍 自动更新地缘政治分析报告 $(date +'%Y-%m-%d')

          - 从RSS源抓取最新地缘政治新闻
          - 自动生成影响分析报告
          - 包含经济影响、华人社区影响、应对建议"
          
          # 推送
          git push
          
          echo "✅ 已提交并推送新文件"
      
      # 7. 上传Artifact（用于调试）
      - name: 📤 上传Artifact
        uses: actions/upload-artifact@v4
        with:
          name: geopolitical-analysis-${{ github.run_number }}
          path: |
            content/geopolitical_impact_analysis_*.md
          retention-days: 30
      
      # 8. 发送通知（可选）
      - name: 📧 发送完成通知
        if: steps.check_files.outputs.has_new_files == 'true'
        run: |
          echo "🎉 地缘政治分析报告已生成并推送！"
          echo "📂 查看文件: https://github.com/${{ github.repository }}/tree/main/content"
